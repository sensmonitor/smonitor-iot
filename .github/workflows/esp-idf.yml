name: ESP-IDF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.profile }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: lilygo-sim7000g
            command: idf.py build
          - profile: generic-esp32-uart-modem
            command: idf.py -B /tmp/smonitor-iot-generic -D SDKCONFIG=/tmp/smonitor-iot-generic-sdkconfig -D SDKCONFIG_DEFAULTS="sdkconfig.defaults;examples/generic_esp32_uart_modem/sdkconfig.defaults" build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.4
          target: esp32
          path: "."
          command: ${{ matrix.command }}
